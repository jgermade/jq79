<script :setup>
  let players = [
    { id: 1, name: "Ada" },
    { id: 2, name: "Grace" },
    { id: 3, name: "Alan" },
  ]

  const reverse = () => {
    players = [...players].reverse()
  }
</script>

<button @click="reverse">reverse</button>

<ul>
  <li :each="player in players" :key="player.id">
    <span class="name">{{ player.name }}</span>
    <input placeholder="notes…" />
  </li>
</ul>
