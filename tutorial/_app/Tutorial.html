<!--
  The tutorial app, itself a jq79 component. Mounted by the generated
  site/tutorial/index.html with the exercise manifest as render data:

    app.mount("#app", { sections, Component79, hljs })

  This file is the shell: the state (which exercise is open, which file is being
  edited, whether a solution is being reviewed), the navigation, and the layout.
  The four panes are components under ./components/, imported at runtime the way
  any jq79 component imports another - the tutorial runs on the library it
  teaches, and the exercise the user is editing is compiled by the very same
  Component79 the page imports.

  None of the panes writes to the state it renders: props go down, and what the
  user did comes back up as a `tutorial:*` event, caught on the container below.
  Each exercise's files live in the store as { name, source }.

  `hljs` is the same highlighter the site build runs over the markdown, so the
  editor, the solution diff and the snippets in the prose are colored by one
  library off one stylesheet (the .hljs-* rules the shell page carries). The
  panes get the two functions they need rather than the library itself.
-->
<script :setup="{ sections, Component79, hljs }">
  const flat = sections.flatMap(section =>
    section.exercises.map(exercise => ({ ...exercise, section: section.title }))
  )

  const toFiles = sources =>
    Object.entries(sources).map(([name, source]) => ({ name, source }))

  let index = 0
  let files = []
  let active = 0
  // the files the editor would hold if the solution were applied - diffed
  // against what it holds now, and waiting to be accepted; null the rest of the time
  let proposal = null

  $: current = flat[index]

  // an exercise without a solution/ is a demonstration: there's nothing to
  // solve, so the solution button goes away, and the output pane shows what the
  // selected file renders to instead of mounting it live (see Output.html)
  $: demo = !Object.keys(current.solution).length

  // reviewing a solution that changes nothing (the user already got there) offers
  // no apply, only cancel - so the tab bar knows whether to show the apply button
  $: reviewChanges = proposal && Object.entries(proposal).some(
    ([name, source]) => files.find(file => file.name === name)?.source !== source
  )

  // --- what the panes are handed ---------------------------------------------

  // the preview compiles a file with the page's own Component79; non-entry files
  // are handed to the entry as its `modules` map
  const compile = (source, modules) => new Component79(source, { modules })

  // an exercise is html unless its tab says otherwise; xml is what hljs calls
  // html, and it highlights a component's <script>/<style> blocks as js/css
  const languageOf = name =>
    !name ? "xml"
    : name.endsWith(".js") ? "javascript"
    : name.endsWith(".css") ? "css"
    : name.endsWith(".json") ? "json"
    : "xml"

  // half-written code is the normal state of an editor, so illegal matches can't
  // be allowed to throw - hljs just colors what it can make sense of
  const highlight = (code, language) =>
    hljs.highlight(code, { language, ignoreIllegals: true }).value

  // --- what the panes report back ---------------------------------------------

  const edit = source => { files[active].source = source }

  // solutions only list the files they change, so the rest carry over as-is -
  // which also means applying one reverts any edits the user made elsewhere.
  // That's the diff: what the editor holds now against what it would hold after
  const review = () => { proposal = { ...flat[index].files, ...flat[index].solution } }

  const apply = () => {
    files = toFiles(proposal)
    proposal = null
  }

  const dismiss = () => { proposal = null }

  // --- navigation --------------------------------------------------------------

  const load = position => {
    index = Math.min(Math.max(position, 0), flat.length - 1)
    files = toFiles(flat[index].files)
    active = 0
    proposal = null
  }

  const go = position => {
    load(position)
    location.hash = flat[index].path
  }

  const fromHash = () => {
    const path = decodeURIComponent(location.hash.slice(1))
    const found = flat.findIndex(exercise => exercise.path === path)
    load(found === -1 ? 0 : found)
  }

  const reset = () => {
    files = toFiles(flat[index].files)
    proposal = null
  }

  // a setup script has no teardown hook, so this listener outlives the instance
  // that registered it. Harmless on the real page (there's only ever one), but
  // it means a replaced instance would keep answering hash changes - so ignore
  // the event unless this instance's DOM is still on screen
  window.addEventListener("hashchange", () => {
    if ($self(".tutorial-container")?.isConnected) fromHash()
  })

  fromHash()

  // the panes. They are fetched, so they arrive after the template has rendered:
  // a tag whose component variable is still undefined renders nothing, and the
  // pane appears where it stands once its import resolves
  const Toc = await import("./components/Toc.html")
  const Lesson = await import("./components/Lesson.html")
  const Editor = await import("./components/Editor.html")
  const Diff = await import("./components/Diff.html")
  const Preview = await import("./components/Preview.html")
  const Output = await import("./components/Output.html")
</script>

<div
  class="tutorial-container"
  @tutorial:go="go($event.detail)"
  @tutorial:edit="edit($event.detail)"
  @tutorial:apply="apply"
  @tutorial:dismiss="dismiss"
>
  <Toc :sections :path="current.path" />

  <Lesson :content="current.html" :index :total="flat.length" />

  <section class="work">
    <header class="tabs">
      <button
        :each="file in files"
        :key="file.name"
        :attrs="{ class: $index === active ? 'tab active' : 'tab' }"
        @click="active = $index"
      >{{ file.name }}</button>
      <span class="spacer"></span>
      <!-- reviewing a solution takes the tab bar over: the diff is an overlay
           with no chrome of its own, so cancel/apply stand where reset/solution
           do the rest of the time -->
      <button class="ghost" :if="proposal" @click="dismiss">cancel</button>
      <button class="ghost" :else @click="reset">reset</button>
      <button class="accept" :if="reviewChanges" @click="apply">apply</button>
      <button class="ghost" :elseif="!proposal && !demo" @click="review">solution</button>
    </header>

    <!-- the editor and the diff share one pane: the diff is an overlay, so the
         editor keeps its state (and the preview keeps its last good render)
         while a solution is being reviewed. The diff it shows follows the active
         tab, so switching files switches which change is on screen -->
    <div class="pane">
      <Editor :files :active :readonly="!!proposal" :highlight :language-of="languageOf" />
      <Diff :if="proposal" :files :name="files[active]?.name" :after="proposal" :highlight :language-of="languageOf" />
    </div>

    <!-- `exercise` isn't rendered: it's how the preview tells "the user typed"
         (recompile, debounced) from "the user went somewhere else" (drop what's
         on screen now, it belongs to the last exercise). A demo lesson swaps
         the live preview for the resulting-html pane -->
    <Preview :if="!demo" :files :compile :exercise="current.path" />
    <Output :else :files :active :compile :highlight />
  </section>
</div>

<style>
  .tutorial-container {
    display: grid;
    grid-template-columns: 15rem 1fr 1fr;
    gap: 1px;
    background: var(--line);
    /* the shell page makes #app the flex-grown remainder below the header */
    height: calc(100vh - 2.5rem);
    height: calc(100dvh - 2.5rem);
  }

  /* the panes: <Toc>, <Lesson> and the .work column (a component renders its
     content between two comment markers, which are no grid items of their own).
     They are fetched, so each lands whenever its request comes back and used to
     pop onto the page as it did - the fade is the same 250ms the preview takes,
     so a loading tutorial arrives rather than flashing into place */
  .tutorial-container > * {
    background: var(--bg);
    overflow-y: auto;
  }

  /* the work column renders with the template, but the three panes it holds are
     fetched like the two above it: <Editor> and <Diff> in .pane, <Preview> under
     it. They land whenever their request comes back, so they fade in on their own
     rather than with the column that was already there waiting for them */
  .tutorial-container > *,
  .pane > *,
  .work > .output {
    animation: pane-in 250ms ease-out;
  }

  @keyframes pane-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    .tutorial-container > *,
    .pane > *,
    .work > .output { animation: none; }
  }

  /* the work column: tabs, the editor pane, the preview under it */

  .work { display: flex; flex-direction: column; overflow: hidden; }

  .tabs {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.5rem 0.6rem;
    border-bottom: 1px solid var(--line);
  }
  .tabs .spacer { flex: 1; }
  /* .ghost is the diff bar's cancel button too: the tutorial mounts into the
     page rather than a shadow root, so one stylesheet dresses all of its chrome */
  .tab, .ghost {
    padding: 0.3em 0.7em;
    border: 0;
    border-radius: 6px;
    background: none;
    font: inherit;
    font-size: 0.85rem;
    cursor: pointer;
  }
  /* a tab names a file the user is about to read, so it stays legible: --muted
     is dim enough on the editor's chrome that the file you aren't in reads as
     disabled rather than merely inactive */
  .tab { color: var(--fg); opacity: 0.65; }
  .tab:hover { background: var(--code-bg); opacity: 1; }
  .tab.active { background: var(--code-bg); opacity: 1; font-weight: 600; }
  .ghost { color: var(--accent); }
  .ghost:hover { background: var(--code-bg); }
  /* apply commits the reviewed solution, so it reads as the primary action next
     to cancel's ghost - same tab bar the diff overlays */
  .accept {
    padding: 0.3em 0.9em;
    border: 0;
    border-radius: 6px;
    background: var(--accent);
    color: #fff;
    font: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }
  .accept:hover { filter: brightness(1.1); }

  .pane {
    position: relative;
    flex: 1 1 55%;
    min-height: 12rem;
    border-bottom: 1px solid var(--line);
  }

  @media (max-width: 60rem) {
    .tutorial-container { grid-template-columns: 1fr; height: auto; }
    .work { height: 80vh; }
  }
</style>
