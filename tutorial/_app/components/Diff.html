<!--
  The solution, proposed rather than applied: what the editor holds now (`files`)
  against what it would hold after (`after`), line by line. It renders over the
  editor, so the editor keeps its state - and the preview keeps its last good
  render - while the diff is being read. It has no chrome of its own: the tab bar
  above it carries cancel/apply, and the tab that's active picks which file's
  diff (`name`) is on screen, so the diff follows the tabs.
-->
<script :setup="{ files, name, after, highlight, languageOf }">
  // a plain LCS line diff: the table is O(lines²), which for an exercise file is
  // nothing, and it keeps the common lines aligned so the change reads as a change
  const diffLines = (before, after) => {
    const a = before.split("\n")
    const b = after.split("\n")

    const lcs = Array.from({ length: a.length + 1 }, () => new Array(b.length + 1).fill(0))
    for (let i = a.length - 1; i >= 0; i--) {
      for (let j = b.length - 1; j >= 0; j--) {
        lcs[i][j] = a[i] === b[j]
          ? lcs[i + 1][j + 1] + 1
          : Math.max(lcs[i + 1][j], lcs[i][j + 1])
      }
    }

    const rows = []
    let i = 0
    let j = 0
    while (i < a.length && j < b.length) {
      if (a[i] === b[j]) {
        rows.push({ type: "same", text: a[i] })
        i++
        j++
      } else if (lcs[i + 1][j] >= lcs[i][j + 1]) {
        rows.push({ type: "del", text: a[i++] })
      } else {
        rows.push({ type: "add", text: b[j++] })
      }
    }
    while (i < a.length) rows.push({ type: "del", text: a[i++] })
    while (j < b.length) rows.push({ type: "add", text: b[j++] })

    return rows
  }

  // hljs colors a file in one pass; a diff is a stack of single lines, so the
  // language each one is in has to be carried across them by hand - otherwise
  // every line inside a <script> would come out as flat, uncolored markup
  const highlightRows = (rows, language) => {
    let inside = language
    return rows.map(({ type, text }) => {
      const opens = /<(script|style)\b/i.exec(text)
      const closes = /<\/(script|style)/i.test(text)
      // the tag line itself is markup; only what sits between the tags isn't
      const lineLanguage = opens || closes ? "xml" : inside
      if (opens) inside = opens[1].toLowerCase() === "script" ? "javascript" : "css"
      if (closes) inside = "xml"
      // an empty line has no highlighted output, and an empty row has no height:
      // the newline gives it one back (the rows are white-space: pre-wrap)
      return { type, html: highlight(text, lineLanguage) || "\n" }
    })
  }

  const sourceOf = name => files.find(file => file.name === name)?.source

  // the active file only: `after[name]` is what the solution would make it, and a
  // file the solution leaves alone diffs against itself (every row `same`)
  $: rows = highlightRows(
    diffLines(sourceOf(name) ?? "", after[name] ?? sourceOf(name) ?? ""),
    languageOf(name)
  )
</script>

<div class="diff">
  <div class="diff-body">
    <div class="diff-rows hljs">
      <div
        :each="row in rows"
        :key="$index"
        :attrs="{ class: `row ${row.type}` }"
        :html="row.html"
      ></div>
    </div>
  </div>
</div>

<style>
  .diff {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  .diff-body { flex: 1; overflow: auto; background: var(--code-bg); }

  .diff-rows { padding: 0.5rem 0; }
  .row {
    padding: 0 1rem 0 2rem;
    font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    tab-size: 2;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    word-break: break-word;
    min-height: 1.6em;
  }
  /* the marker sits in the padding, so it can't push the code out of alignment
     with the same code one row above or below */
  .row::before {
    display: inline-block;
    width: 1rem;
    margin-left: -1.5rem;
    opacity: 0.7;
    content: " ";
  }
  .row.add { background: color-mix(in srgb, #2da44e 16%, transparent); }
  .row.add::before { content: "+"; }
  .row.del { background: color-mix(in srgb, #cf222e 14%, transparent); }
  .row.del::before { content: "−"; }
  .row.same { opacity: 0.6; }
</style>
