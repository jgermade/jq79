name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write # create the GitHub release
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    outputs:
      new_tag: ${{ steps.bump_version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm install --no-save

      - run: npm test

      - run: npm run build

      - name: Configure Git
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com

      - name: Bump version, commit, and tag
        id: bump_version
        run: |
          NEW_TAG=$(npm version "${{ inputs.bump }}" -m "chore(release): %s")
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: npm publish preflight
        run: |
          npm config get registry
          npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Push commit and tag
        run: git push origin HEAD --follow-tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_TAG: ${{ steps.bump_version.outputs.new_tag }}
        run: gh release create "$NEW_TAG" dist/* --title "$NEW_TAG" --generate-notes

  # GitHub Pages site: rendered docs, self-hosted badges (npm version, test
  # coverage), the HTML coverage report, and the dist files at the site root
  # so the Pages URL doubles as a CDN. Requires Pages to be configured with
  # "GitHub Actions" as the source (repo Settings > Pages)
  pages:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # the version-bump commit the release job just pushed
          ref: ${{ needs.release.outputs.new_tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: |
          npm install --no-save
          npm install --no-save -D highlight.js

      - run: npm run build

      - run: npm run test:coverage

      - run: npm run site

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v5
