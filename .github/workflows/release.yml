name: Release

# fires when a version tag is pushed, e.g.:
#   npm version patch && git push --follow-tags
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub release
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Check tag matches package.json version
        run: |
          version="v$(node -p "require('./package.json').version")"
          if [ "$version" != "$GITHUB_REF_NAME" ]; then
            echo "package.json version ($version) does not match tag ($GITHUB_REF_NAME)" >&2
            exit 1
          fi

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes

      - name: Publish to npm
        run: npm publish --provenance --access public
